    <script>
        $(function () {
            function bindPcNavHover() {
                const isPc = $(window).width() >= 720;

                if (isPc) {
                    $('.nav_1depth')
                    .off('.pcNav') // 중복 바인딩 방지
                    .on('mouseenter.pcNav', function () {
                        $(this).children('.nav_2depth').stop(true, true).slideDown(200);
                    })
                    .on('mouseleave.pcNav', function () {
                        $(this).children('.nav_2depth').stop(true, true).slideUp(200);
                    });
                } else {
                    $('.nav_1depth').off('.pcNav');
                    $('.nav_2depth').removeAttr('style'); // 열려있던 메뉴 초기화
                }
            }

            // 최초 실행
            bindPcNavHover();

            // 화면 크기 변경 시 다시 적용
            $(window).on('resize', bindPcNavHover);

            $('body').removeClass('no-scroll');
            $('.nav_open').click(function () {
                $(this).toggleClass('active');
                $('nav > ul').toggleClass('open');

                if ($(this).hasClass('active')) {
                    $('body').addClass('no-scroll');
                } else {
                    $('body').removeClass('no-scroll');
                }
            });

        });
    </script>

<script>
    function modalOpen(id) {
        document.querySelectorAll('.modal_wrap').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    document.querySelectorAll('.modal_wrap').forEach(modal => {
        modal.addEventListener('click', function(e){
            if(e.target.classList.contains('modal_wrap')){
                this.style.display = 'none';
            }
        });
    });
</script>
